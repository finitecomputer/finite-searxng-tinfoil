# Tinfoil Container Configuration
# Public repo root requirement:
#   This file must live at the root of a public GitHub repo.
#
# Replace OWNER/REPO before running the release workflow. The workflow rewrites
# this image value with the final ghcr.io digest.

cvm-version: 0.10.4
cpus: 8
memory: 16384

networks:
  public:
    egress: open

containers:
  - name: "searxng"
    image: "ghcr.io/finitecomputer/finite-searxng-tinfoil@sha256:a0d2f4a6c1701e50922e666476fd7cf5707a98d5184927c36e1c7f8b7f81e9a6" # v0.0.4
    env:
      - SEARXNG_BASE_URL: ""
      - SEARXNG_LIMITER: "false"
    secrets:
      - SEARXNG_SECRET
    networks: [public]
    restart: unless-stopped
    read_only: false
    tmpfs:
      /tmp: "size=256m"
    memory: "512m"
    cpus: 2.0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://127.0.0.1:8080/healthz' >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

shim:
  upstream-container: "searxng"
  upstream-port: 8080
  paths:
    - /search
    - /search/*
